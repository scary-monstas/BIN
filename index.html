<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Offline BIN Checker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6 font-sans">
    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-gray-800">Advanced Offline BIN Tool</h1>
            <p class="text-gray-500 mt-2">Zero API Limits • Preserves All Original Data • Instant Filters & Export</p>
        </div>

        <!-- Step 1: Database Loading -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold mb-4 text-gray-800">1. Load BIN Database</h2>
            <div class="flex flex-col sm:flex-row gap-4 items-center">
                <button onclick="fetchGithubDB()" class="px-6 py-3 bg-purple-600 text-white font-semibold rounded-lg shadow-md hover:bg-purple-700 transition w-full sm:w-auto">
                    Auto-Load GitHub Database
                </button>
                <span class="text-gray-400 font-bold">OR</span>
                <input type="file" id="dbFile" accept=".csv" class="block w-full sm:w-auto text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 cursor-pointer">
                <button onclick="loadManualDB()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">Load File</button>
            </div>
            <p id="dbStatus" class="mt-4 text-sm font-semibold text-red-500">Database Status: Not Loaded</p>
        </div>

        <!-- Step 2: Processing & Filters (Hidden until DB loads) -->
        <div id="step2" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-xl font-bold mb-4 text-gray-800">2. Upload Your List & Filter</h2>
            
            <div class="flex flex-col sm:flex-row justify-between gap-4 mb-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <!-- Upload Target -->
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <input type="file" id="targetCsv" accept=".csv,.txt" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    <button onclick="processList()" class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 transition whitespace-nowrap">Process Data</button>
                </div>
                
                <!-- Filters & Export -->
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <select id="typeFilter" onchange="filterTable()" class="border border-gray-300 text-gray-700 py-2 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="ALL">Show All Cards</option>
                        <option value="CREDIT">Credit Only</option>
                        <option value="DEBIT">Debit Only</option>
                    </select>
                    <button onclick="exportToCSV()" class="px-6 py-2 bg-green-600 text-white font-semibold rounded-lg shadow-md hover:bg-green-700 transition flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Export CSV
                    </button>
                </div>
            </div>

            <!-- Results Table -->
            <div class="overflow-x-auto border border-gray-200 rounded-lg">
                <table class="w-full text-left border-collapse text-sm whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-800 text-white">
                            <th class="p-3 font-semibold">Raw Original Data (Card / Name / Zip, etc)</th>
                            <th class="p-3 font-semibold border-l border-gray-600">BIN</th>
                            <th class="p-3 font-semibold border-l border-gray-600">Brand</th>
                            <th class="p-3 font-semibold border-l border-gray-600">Type</th>
                            <th class="p-3 font-semibold border-l border-gray-600">Bank</th>
                            <th class="p-3 font-semibold border-l border-gray-600">Country</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200">
                        <!-- Rows go here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://raw.githubusercontent.com/iannuttall/binlist-data/refs/heads/master/binlist-data.csv";
        let binDatabase = new Map();
        let processedResults = []; // Stores the master list of checked cards

        // ---------------------------------------------------------
        // DATABASE LOADING FUNCTIONS
        // ---------------------------------------------------------

        async function fetchGithubDB() {
            const statusText = document.getElementById('dbStatus');
            statusText.innerHTML = `Database Status: <span class="text-blue-600">Downloading from GitHub... Please wait (approx 3-5 seconds).</span>`;
            
            try {
                const response = await fetch(DB_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                const csvText = await response.text();
                parseDBData(csvText);
            } catch (error) {
                statusText.innerHTML = `Database Status: <span class="text-red-600">Failed to auto-load. Try manual download.</span>`;
                console.error(error);
            }
        }

        function loadManualDB() {
            const file = document.getElementById('dbFile').files[0];
            if (!file) { alert("Please select a file."); return; }
            const statusText = document.getElementById('dbStatus');
            statusText.innerHTML = `Database Status: <span class="text-blue-600">Reading local file...</span>`;
            
            const reader = new FileReader();
            reader.onload = function(e) { parseDBData(e.target.result); };
            reader.readAsText(file);
        }

        function parseDBData(csvString) {
            Papa.parse(csvString, {
                header: true, // The github file has headers (bin,brand,type,category,issuer,alpha_2,alpha_3,country)
                skipEmptyLines: true,
                complete: function(results) {
                    binDatabase.clear();
                    
                    results.data.forEach(row => {
                        const bin = row['bin'];
                        if (bin) {
                            binDatabase.set(bin, {
                                brand: row['brand'] || 'N/A',
                                type: row['type'] || 'N/A',
                                bank: row['issuer'] || 'N/A',
                                country: row['country'] || row['alpha_2'] || 'N/A'
                            });
                        }
                    });

                    document.getElementById('dbStatus').innerHTML = `Database Status: <span class="text-green-600">✅ Successfully loaded ${binDatabase.size.toLocaleString()} BINs! Ready.</span>`;
                    document.getElementById('step2').classList.remove('opacity-50', 'pointer-events-none');
                }
            });
        }

        // ---------------------------------------------------------
        // TARGET LIST PROCESSING
        // ---------------------------------------------------------

        function processList() {
            const file = document.getElementById('targetCsv').files[0];
            if (!file) { alert("Please upload your card data CSV/TXT first."); return; }

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center font-bold text-blue-600">Processing list instantly...</td></tr>`;

            Papa.parse(file, {
                header: false, // Set to false to handle raw dumps/data without headers accurately
                skipEmptyLines: true,
                complete: function(results) {
                    processedResults = []; // Reset stored results
                    
                    results.data.forEach(row => {
                        // Re-join the row as a single string to find the card number anywhere
                        const rawLineString = row.join(','); 
                        
                        // Extract card number: Finds the first block of 15-19 digits ignoring spaces/hyphens
                        const cleanDigitsOnly = rawLineString.replace(/[\s-]/g, '');
                        const cardMatch = cleanDigitsOnly.match(/\d{15,19}/);
                        
                        let bin = 'Unknown';
                        let binInfo = { brand: 'N/A', type: 'N/A', bank: 'N/A', country: 'N/A' };
                        let found = false;

                        if (cardMatch) {
                            bin = cardMatch[0].substring(0, 6);
                            if (binDatabase.has(bin)) {
                                binInfo = binDatabase.get(bin);
                                found = true;
                            }
                        }

                        // Save to our master array for filtering/exporting
                        processedResults.push({
                            originalRaw: rawLineString,
                            bin: bin,
                            brand: binInfo.brand,
                            type: binInfo.type,
                            bank: binInfo.bank,
                            country: binInfo.country,
                            found: found
                        });
                    });

                    renderTable();
                }
            });
        }

        // ---------------------------------------------------------
        // RENDERING & FILTERING
        // ---------------------------------------------------------

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const filterValue = document.getElementById('typeFilter').value.toUpperCase();
            tbody.innerHTML = '';

            processedResults.forEach(item => {
                const itemType = item.type.toUpperCase();

                // Apply Filter Logic
                if (filterValue !== "ALL") {
                    if (filterValue === "CREDIT" && itemType !== "CREDIT") return;
                    if (filterValue === "DEBIT" && itemType !== "DEBIT") return;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition duration-150";
                
                // Color Code the Type column
                let typeBadge = `<span class="px-2 py-1 rounded text-xs font-bold bg-gray-200 text-gray-700">${item.type}</span>`;
                if (itemType === 'CREDIT') typeBadge = `<span class="px-2 py-1 rounded text-xs font-bold bg-blue-100 text-blue-700">CREDIT</span>`;
                if (itemType === 'DEBIT') typeBadge = `<span class="px-2 py-1 rounded text-xs font-bold bg-green-100 text-green-700">DEBIT</span>`;

                if (item.found) {
                    tr.innerHTML = `
                        <td class="p-3 font-mono text-gray-600 truncate max-w-md" title="${item.originalRaw}">${item.originalRaw}</td>
                        <td class="p-3 font-bold border-l border-gray-200">${item.bin}</td>
                        <td class="p-3 capitalize border-l border-gray-200">${item.brand}</td>
                        <td class="p-3 capitalize border-l border-gray-200">${typeBadge}</td>
                        <td class="p-3 border-l border-gray-200 truncate max-w-xs" title="${item.bank}">${item.bank}</td>
                        <td class="p-3 border-l border-gray-200">${item.country}</td>
                    `;
                } else {
                    tr.innerHTML = `
                        <td class="p-3 font-mono text-gray-600 truncate max-w-md">${item.originalRaw}</td>
                        <td class="p-3 text-red-500 font-bold border-l border-gray-200">${item.bin !== 'Unknown' ? item.bin : 'N/A'}</td>
                        <td class="p-3 text-red-400 italic border-l border-gray-200" colspan="4">BIN not in database</td>
                    `;
                }
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            renderTable();
        }

        // ---------------------------------------------------------
        // EXPORT TO CSV
        // ---------------------------------------------------------

        function exportToCSV() {
            if (processedResults.length === 0) {
                alert("No data to export. Please process a list first.");
                return;
            }

            const filterValue = document.getElementById('typeFilter').value.toUpperCase();
            
            // Generate Header
            let csvContent = "Original Data,BIN,Brand,Type,Bank,Country\n";

            // Generate Rows (respecting current filters)
            processedResults.forEach(item => {
                const itemType = item.type.toUpperCase();
                
                if (filterValue !== "ALL") {
                    if (filterValue === "CREDIT" && itemType !== "CREDIT") return;
                    if (filterValue === "DEBIT" && itemType !== "DEBIT") return;
                }

                // Wrap fields in quotes to prevent internal commas from breaking the layout
                const safeOriginal = `"${item.originalRaw.replace(/"/g, '""')}"`;
                const safeBank = `"${item.bank.replace(/"/g, '""')}"`;

                csvContent += `${safeOriginal},${item.bin},${item.brand},${item.type},${safeBank},${item.country}\n`;
            });

            // Trigger Download
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            link.setAttribute("href", url);
            link.setAttribute("download", `BIN_Checked_Results_${filterValue}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
