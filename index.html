<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIN / Card Checker Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-800">Secure BIN Lookup Tool</h1>
            <p class="text-gray-500 mt-2">Powered by binsearchlookup.com</p>
        </div>

        <!-- API Configuration Section -->
        <div class="bg-blue-50 p-6 rounded-lg shadow-sm border border-blue-200">
            <h2 class="text-lg font-semibold text-blue-800 mb-4">Step 1: API Configuration</h2>
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <label class="text-sm font-medium text-blue-900 w-full md:w-auto">Your API Key:</label>
                <input type="password" id="apiKey" placeholder="Paste YOUR_KEY here" 
                    class="flex-1 w-full px-4 py-2 border border-blue-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <p class="text-xs text-blue-600 mt-3">
                * Your User ID (<code class="bg-blue-100 px-1 rounded">35ae4402-1ac3-41ca-a3ff-4a43b66aded4</code>) is already configured in the code.
            </p>
        </div>

        <!-- Manual Input Section -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-xl font-semibold mb-4">Step 2: Manual Entry</h2>
            <div class="flex gap-4">
                <input type="text" id="manualInput" placeholder="Enter Card Number or 6-digit BIN" 
                    class="flex-1 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="checkManual()" 
                    class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition">
                    Check BIN
                </button>
            </div>
            <div id="manualResult" class="mt-4 hidden"></div>
        </div>

        <!-- CSV Upload Section -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-xl font-semibold mb-4">Step 3: Batch CSV Upload</h2>
            <div class="flex items-center gap-4 mb-4">
                <input type="file" id="csvFile" accept=".csv" 
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <button onclick="processCSV()" 
                    class="px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition whitespace-nowrap">
                    Process File
                </button>
            </div>
            
            <div class="overflow-x-auto mt-6">
                <table class="w-full text-left border-collapse" id="resultsTable">
                    <thead>
                        <tr class="bg-gray-100 border-b">
                            <th class="p-3 text-sm font-semibold text-gray-600">BIN</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Brand / Scheme</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Type</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Bank Name</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Country</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.binsearchlookup.com/lookup?bin=";
        const USER_ID = "35ae4402-1ac3-41ca-a3ff-4a43b66aded4";

        async function fetchBinInfo(cardNumber) {
            // Get the API key from the input box
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                return { error: "Please paste your API Key in Step 1 first." };
            }

            const cleanNumber = cardNumber.toString().replace(/\D/g, '');
            if (cleanNumber.length < 6) return { error: "Invalid BIN (too short)" };
            const bin = cleanNumber.substring(0, 6);

            try {
                // Use the headers exactly as requested in your cURL command
                const response = await fetch(API_URL + bin, {
                    method: 'GET',
                    headers: {
                        'X-API-Key': apiKey,
                        'X-User-ID': USER_ID
                    }
                });
                
                if (response.status === 401 || response.status === 403) return { error: "Invalid API Key or Unauthorized" };
                if (response.status === 429) return { error: "Rate limit exceeded" };
                if (!response.ok) return { error: "BIN not found or API error" };
                
                const data = await response.json();
                
                // Safely parse the JSON (handles slight variations in API response naming conventions)
                return {
                    bin: bin,
                    scheme: data.scheme || data.brand || data.network || 'N/A',
                    type: data.type || data.card_type || 'N/A',
                    bank: (data.bank && data.bank.name) || data.bank_name || data.issuer || data.bank || 'N/A',
                    country: (data.country && data.country.name) || data.country_name || (typeof data.country === 'string' ? data.country : 'N/A')
                };
            } catch (err) {
                return { error: "Network error. Check API Key or CORS block." };
            }
        }

        async function checkManual() {
            const input = document.getElementById('manualInput').value;
            const resultDiv = document.getElementById('manualResult');
            
            if (!input) {
                alert("Please enter a card number or BIN");
                return;
            }

            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `<p class="text-gray-500">Loading data for BIN...</p>`;

            const data = await fetchBinInfo(input);

            if (data.error) {
                resultDiv.innerHTML = `<p class="text-red-500 font-semibold">${data.error}</p>`;
            } else {
                resultDiv.innerHTML = `
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4 bg-gray-50 rounded border border-gray-200 mt-2">
                        <div><p class="text-xs text-gray-500">BIN</p><p class="font-bold">${data.bin}</p></div>
                        <div><p class="text-xs text-gray-500">Brand</p><p class="font-bold capitalize">${data.scheme}</p></div>
                        <div><p class="text-xs text-gray-500">Type</p><p class="font-bold capitalize ${data.type.toLowerCase() === 'credit' ? 'text-blue-600' : 'text-green-600'}">${data.type}</p></div>
                        <div><p class="text-xs text-gray-500">Bank</p><p class="font-bold">${data.bank}</p></div>
                        <div class="col-span-2 md:col-span-4"><p class="text-xs text-gray-500">Country</p><p class="font-bold">${data.country}</p></div>
                    </div>
                `;
            }
        }

        function processCSV() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            const tbody = document.getElementById('tableBody');

            if (!file) {
                alert("Please select a CSV file first.");
                return;
            }

            tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-500">Reading file...</td></tr>`;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    tbody.innerHTML = ''; 
                    const rows = results.data;

                    let cardColumnKey = null;
                    if (rows.length > 0) {
                        const keys = Object.keys(rows[0]);
                        cardColumnKey = keys.find(k => k.toLowerCase().includes('card') || k.toLowerCase().includes('cc') || k.toLowerCase().includes('no'));
                        if (!cardColumnKey) cardColumnKey = keys[0]; 
                    }

                    if (!cardColumnKey) {
                        tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-500">Could not find a valid data column.</td></tr>`;
                        return;
                    }

                    for (let i = 0; i < rows.length; i++) {
                        const rawCardNumber = rows[i][cardColumnKey];
                        if (!rawCardNumber) continue;

                        const cleanNumber = rawCardNumber.toString().replace(/\D/g, '');
                        if (cleanNumber.length < 6) continue;

                        const bin = cleanNumber.substring(0, 6);
                        
                        const tr = document.createElement('tr');
                        tr.className = "border-b hover:bg-gray-50";
                        tr.innerHTML = `
                            <td class="p-3 font-mono text-gray-700">${bin}</td>
                            <td class="p-3 text-gray-400 italic" colspan="4">Fetching...</td>
                        `;
                        tbody.appendChild(tr);

                        const data = await fetchBinInfo(bin);
                        
                        // Adding a brief 200ms delay to play nice with the server
                        await new Promise(r => setTimeout(r, 200)); 
                        
                        if (data.error) {
                            tr.innerHTML = `
                                <td class="p-3 font-mono text-gray-700">${bin}</td>
                                <td class="p-3 text-red-500 text-sm" colspan="4">${data.error}</td>
                            `;
                        } else {
                            tr.innerHTML = `
                                <td class="p-3 font-mono text-gray-800">${data.bin}</td>
                                <td class="p-3 text-gray-800 capitalize">${data.scheme}</td>
                                <td class="p-3 font-semibold capitalize ${data.type.toLowerCase() === 'credit' ? 'text-blue-600' : 'text-green-600'}">${data.type}</td>
                                <td class="p-3 text-gray-800">${data.bank}</td>
                                <td class="p-3 text-gray-800">${data.country}</td>
                            `;
                        }
                    }
                    
                    const finishTr = document.createElement('tr');
                    finishTr.innerHTML = `<td colspan="5" class="p-4 text-center text-green-600 font-semibold">Processing Complete!</td>`;
                    tbody.appendChild(finishTr);
                }
            });
        }
    </script>
</body>
</html>
